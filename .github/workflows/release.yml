name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '10' }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install libs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libpipewire-0.3-dev libgbm-dev libdbus-1-dev libsecret-1-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm run tauri build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          CARGO_NET_RETRY: 5
          CARGO_HTTP_TIMEOUT: 60
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}
          path: src-tauri/target/release/bundle/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: artifacts

      - name: Generate latest.json for updater
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "{\"version\":\"${VERSION}\",\"notes\":\"\",\"pub_date\":\"${PUB_DATE}\",\"platforms\":{}}" > latest.json

          # Map platform tags
          # - darwin-aarch64: macOS Apple Silicon
          # - darwin-x86_64:  macOS Intel
          # - linux-x86_64:   Linux x64
          # - windows-x86_64: Windows x64

          find artifacts -name '*.sig' | while read sigfile; do
            sig=$(cat "$sigfile")
            basename=$(basename "$sigfile" .sig)
            dir=$(dirname "$sigfile")

            if echo "$dir" | grep -q "bundle-ubuntu-latest"; then
              plat="linux-x86_64"
            elif echo "$dir" | grep -q "bundle-macos-latest"; then
              if echo "$basename" | grep -qi "aarch64"; then
                plat="darwin-aarch64"
              else
                plat="darwin-x86_64"
              fi
            elif echo "$dir" | grep -q "bundle-windows-latest"; then
              plat="windows-x86_64"
            else
              echo "  skip unknown: $dir/$basename"
              continue
            fi

            url="https://github.com/${{ github.repository }}/releases/latest/download/${basename}"
            echo "  $plat -> $basename"
            jq --arg plat "$plat" --arg sig "$sig" --arg url "$url" \
              '.platforms[$plat] = {"signature": $sig, "url": $url}' \
              latest.json > tmp.json && mv tmp.json latest.json
          done

          echo "=== latest.json ==="
          cat latest.json

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            latest.json
          generate_release_notes: true