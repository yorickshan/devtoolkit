name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
        with: { version: '10' }
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit
      - run: npx vitest run

  build:
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '10' }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install libs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libpipewire-0.3-dev libgbm-dev libdbus-1-dev libsecret-1-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm run tauri build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          CARGO_NET_RETrY: 5
          CARGO_HTTP_TIMEOUT: 60